<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DailyPay Rewards</title>
<style>
body {margin:0;font-family:Arial;background:#0b1220;color:#e5e7eb;}
.header {background:#0f172a;padding:16px;text-align:center;font-size:20px;font-weight:bold;}
.nav {display:flex;justify-content:space-around;background:#020617;padding:10px;position:fixed;bottom:0;width:100%;}
.nav button {background:none;border:none;color:#9ca3af;font-size:12px;}
.section {display:none;padding:20px 16px 80px;}
.active {display:block;}
.card {background:#111827;padding:16px;border-radius:14px;margin-bottom:14px;}
button {padding:10px;border:none;border-radius:10px;background:#22c55e;color:white;}
input {padding:10px;width:90%;margin:6px;border-radius:8px;border:none;background:#1f2937;color:white;}
#overlay {position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);display:none;justify-content:center;align-items:center;}
.box {background:white;color:black;padding:20px;border-radius:12px;text-align:center;}
.small {font-size:12px;color:#9ca3af;}
</style>
</head>
<body><div id="auth" class="section active">
  <h2 style="text-align:center;">DailyPay Rewards</h2>
  <div style="text-align:center;">
    <input id="username" placeholder="Username"><br>
    <input id="password" type="password" placeholder="Password"><br>
    <button onclick="signup()">Sign Up</button>
    <button onclick="login()">Login</button>
  </div>
</div><div id="app" style="display:none;">
  <div class="header">Dashboard</div>  <div id="home" class="section active">
    <div class="card">
      <h3>Welcome, <span id="user"></span></h3>
      <p>Balance: ₦<b id="balance">0</b></p>
      <button onclick="claim()">Claim Reward</button>
      <p class="small">Every 2 hours</p>
    </div>
  </div>  <div id="wallet" class="section">
    <div class="card">
      <h3>Wallet</h3>
      <p>Balance: ₦<b id="walletBal">0</b></p>
    </div><div class="card">
  <h3>Withdraw</h3>
  <input id="bank" placeholder="Bank Name">
  <input id="acc" placeholder="Account Number">
  <input id="amount" placeholder="Amount">
  <button onclick="withdraw()">Withdraw</button>
</div>

  </div>  <div id="historySec" class="section">
    <div class="card">
      <h3>Transactions</h3>
      <ul id="history"></ul>
    </div>
  </div>  <div id="adminSec" class="section">
    <div class="card">
      <h3>Admin Panel</h3>
      <input id="adminUser" placeholder="Username">
      <input id="adminAmount" placeholder="Amount">
      <button onclick="addBalance()">Add Balance</button>
      <button onclick="clearHistory()">Clear History</button>
    </div>
  </div>  <div class="nav">
    <button onclick="show('home')">Home</button>
    <button onclick="show('wallet')">Wallet</button>
    <button onclick="show('historySec')">History</button>
    <button onclick="show('adminSec')">Admin</button>
    <button onclick="logout()">Logout</button>
  </div>
</div><div id="overlay">
  <div class="box">
    <h3>Activate</h3>
    <button onclick="activate()">Continue</button>
  </div>
</div><script>
let currentUser;

function signup(){
  let u=username.value,p=password.value;
  localStorage.setItem(u,JSON.stringify({password:p,balance:0,history:[],active:false}));
  alert("Created");
}

function login(){
  let u=username.value,p=password.value;
  let d=JSON.parse(localStorage.getItem(u));
  if(d && d.password===p){
    currentUser=u;
    auth.style.display="none";
    app.style.display="block";
    user.innerText=u;
    if(!d.active) overlay.style.display="flex";
    update();
  }
}

function activate(){
  let d=JSON.parse(localStorage.getItem(currentUser));
  d.active=true;
  localStorage.setItem(currentUser,JSON.stringify(d));
  overlay.style.display="none";
}

function claim(){
  let d=JSON.parse(localStorage.getItem(currentUser));
  let now=Date.now();
  if(d.lastClaim && now-d.lastClaim<7200000){alert("Wait");return;}
  d.balance+=5000;
  d.lastClaim=now;
  d.history.unshift("+₦5000 reward");
  localStorage.setItem(currentUser,JSON.stringify(d));
  update();
}

function withdraw(){
  let d=JSON.parse(localStorage.getItem(currentUser));
  let amt=parseInt(amount.value);
  if(amt<15000){alert("Min 15k");return;}
  if(amt>d.balance){alert("No balance");return;}
  d.balance-=amt;
  d.history.unshift("-₦"+amt+" pending");
  localStorage.setItem(currentUser,JSON.stringify(d));
  update();

  setTimeout(()=>{
    let d2=JSON.parse(localStorage.getItem(currentUser));
    d2.history[0] = "-₦"+amt+" completed";
    localStorage.setItem(currentUser,JSON.stringify(d2));
    update();
  },5000);
}

function addBalance(){
  let u=adminUser.value;
  let amt=parseInt(adminAmount.value);
  let d=JSON.parse(localStorage.getItem(u));
  if(!d){alert("User not found");return;}
  d.balance+=amt;
  d.history.unshift("+₦"+amt+" admin");
  localStorage.setItem(u,JSON.stringify(d));
  alert("Added");
}

function clearHistory(){
  let d=JSON.parse(localStorage.getItem(currentUser));
  d.history=[];
  localStorage.setItem(currentUser,JSON.stringify(d));
  update();
}

function update(){
  let d=JSON.parse(localStorage.getItem(currentUser));
  balance.innerText=d.balance;
  walletBal.innerText=d.balance;
  history.innerHTML="";
  d.history.forEach(i=>{
    let li=document.createElement("li");li.innerText=i;history.appendChild(li);
  });
}

function show(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function logout(){location.reload();}
</script></body>
</html>
